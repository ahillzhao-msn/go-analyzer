analyzer:
  default_platform: auto
  visits_smart: true
  visits: 96
  visits_prototype: 25
  visits_batch: 50
  visits_precision: 96
  gpu_devices:
  - 0
  parallel_engines: 1
  num_analysis_threads: 2
  num_search_threads: 16
  nn_max_batch_size: 8
storage:
  backend: file
  path: ./analysis_store
  compress: true
model:
  name: go-strength-v2
  input_dim: 12
  hidden_dim: 256
  num_heads: 4
  num_layers: 3
  num_ranks: 9
training:
  batch_size: 32
  learning_rate: 0.001
  epochs: 100
  early_stopping: 10
  incremental: false
  resume_checkpoint: null
hosts:
- name: kata-wsl-v1.16.4
  platform: windows_native
  host: localhost
  kata_path: ./kata-go/windows/v1.16.4/katago.exe
  model_path: ./kata-go/models/kata1-b18c384nbt-s6582191360-d3422816034.bin.gz
  max_concurrent: 3
- name: bob-pc
  platform: ssh
  host: 192.168.9.31
  user: xiaoj
  port: 22
  kata_path: C:/Users/xiaoj/go-analyzer-worker/katago/katago.exe
  model_path: C:/Users/xiaoj/go-analyzer-worker/models/kata1-b18c384nbt-s6582191360-d3422816034.bin.gz
  max_concurrent: 3
  workspace: C:/Users/xiaoj/go-analyzer-worker
