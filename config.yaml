# Go Analyzer 配置
# 优先级: CLI 参数 > 环境变量(GO_ANALYZER_*) > 本文件 > 默认值

analyzer:
  # 适配器平台: auto | windows_native | ssh | http
  default_platform: auto

  # ── Visits 策略 (性能调优扩展点) ─────
  # 支持智能 visits 选择: 关键步高 visits, 非关键步低 visits
  visits_smart: true

  visits: 96               # 默认 visits
  visits_prototype: 25     # 原型验证
  visits_batch: 50         # 批量处理
  visits_precision: 96     # 精确分析

  # ── 并行引擎 (性能调优扩展点) ─────
  # 多 GPU / CPU 并行 KataGo 进程
  gpu_devices: [0]          # GPU 设备列表, [] = CPU
  parallel_engines: 1       # 并行引擎数

  num_analysis_threads: 2
  num_search_threads: 16
  nn_max_batch_size: 8

storage:
  backend: file             # file | sqlite | postgres (your external DB)
  path: ./analysis_store
  compress: true

model:
  name: go-strength-v2
  input_dim: 12
  hidden_dim: 256
  num_heads: 4
  num_layers: 3
  num_ranks: 9

training:
  batch_size: 32
  learning_rate: 0.001
  epochs: 100
  early_stopping: 10
  incremental: false
  resume_checkpoint: null

# 注册的分析主机列表 (Phase 2)
hosts: []
